<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英文閃卡練習</title>
<style>
  :root {
    --ink: #36343a;
    --accent: #e87fa3;
    --accent-deep: #d65f88;
    --teal: #3f8a7e;
    --line: rgba(255,255,255,0.6);
    --muted: #8a8a92;
    --shadow: rgba(40, 50, 70, 0.18);
    --sky-top: #f4a9c0;
    --sky-bot: #f6bfcf;
    --sea-top: #2c4a6e;
    --sea-bot: #20395a;
    --grass: #5fc09a;
    --grass-deep: #46a37f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
    overflow-x: hidden;
  }

  /* ===== 背景風景 ===== */
  .scenery { position: fixed; inset: 0; z-index: -2; overflow: hidden; }
  .sky {
    position: absolute; top: 0; left: 0; right: 0; height: 38%;
    background: linear-gradient(to bottom, #f49bb6 0%, #f5b3c8 60%, #f7c6d4 100%);
  }
  .sun {
    position: absolute; top: 18%; right: 12%;
    width: 46px; height: 46px; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #fdf6e3, #f7e7b8);
    box-shadow: 0 0 30px rgba(253,246,227,0.7);
  }
  .hills {
    position: absolute; top: calc(38% - 26px); left: 0; right: 0; height: 40px;
    background: linear-gradient(to bottom, #3f8a6e, #357a60);
    clip-path: polygon(0 60%, 10% 45%, 22% 58%, 35% 40%, 50% 55%, 65% 42%, 80% 56%, 92% 46%, 100% 58%, 100% 100%, 0 100%);
    opacity: 0.85;
  }
  .sea {
    position: absolute; top: 38%; left: 0; right: 0; height: 36%;
    background: linear-gradient(to bottom, #2d4c72 0%, #24416a 50%, #1f3a5c 100%);
  }
  .sea::after {
    content: ""; position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 80% 25%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 35% 70%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 75% 65%, rgba(255,255,255,0.35), transparent);
    background-size: 180px 90px;
    opacity: 0.6;
  }
  .shore {
    position: absolute; top: calc(74% - 6px); left: 0; right: 0; height: 12px;
    background: #ede4d8;
    box-shadow: 0 -1px 0 rgba(255,255,255,0.5);
  }
  .grass {
    position: absolute; top: 74%; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to bottom, #5fc09a 0%, #4ba886 70%, #3f9779 100%);
  }
  .grass::after {
    content: ""; position: absolute; inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 15% 40%, rgba(40,90,70,0.4), transparent),
      radial-gradient(1.5px 1.5px at 45% 60%, rgba(40,90,70,0.35), transparent),
      radial-gradient(1.5px 1.5px at 70% 35%, rgba(40,90,70,0.4), transparent),
      radial-gradient(1.5px 1.5px at 85% 70%, rgba(40,90,70,0.3), transparent),
      radial-gradient(1.5px 1.5px at 30% 80%, rgba(40,90,70,0.35), transparent);
    background-size: 120px 80px;
  }
  /* 草地上的格紋野餐墊 */
  .picnic {
    position: absolute; bottom: -10px; right: 8%;
    width: 130px; height: 70px;
    background:
      repeating-linear-gradient(0deg, rgba(216,95,136,0.55) 0 8px, transparent 8px 16px),
      repeating-linear-gradient(90deg, rgba(216,95,136,0.55) 0 8px, transparent 8px 16px),
      #f0c9d5;
    transform: perspective(120px) rotateX(55deg) rotate(-8deg);
    border-radius: 4px;
    opacity: 0.8;
  }

  /* 電線桿 */
  .pole {
    position: absolute; width: 2px; background: #5a5560; top: 56%; height: 18%;
    transform-origin: bottom;
  }
  .pole.p1 { left: 12%; }
  .pole.p2 { left: 16%; transform: rotate(-4deg); }
  .pole.p3 { left: 8%; height: 14%; top: 60%; }

  /* ===== 飄動的雲 ===== */
  .cloud {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    opacity: 0.95;
    filter: blur(0.3px);
  }
  .cloud::before, .cloud::after {
    content: ""; position: absolute; background: #fff; border-radius: 50%;
  }
  .cloud-group { position: absolute; top: 30%; }
  .cloud-a {
    width: 80px; height: 28px;
    box-shadow: 30px -8px 0 6px #fff, 62px 2px 0 -2px #fff, -18px 4px 0 -2px #fff;
    animation: driftA 26s ease-in-out infinite alternate;
  }
  .cloud-b {
    width: 60px; height: 22px; top: 33%; left: 40%;
    box-shadow: 24px -6px 0 4px #fff, 48px 2px 0 -3px #fff;
    animation: driftB 32s ease-in-out infinite alternate;
  }
  .cloud-c {
    width: 70px; height: 24px; top: 28%; left: 8%;
    box-shadow: 26px -7px 0 5px #fff, 54px 0 0 -2px #fff;
    animation: driftC 22s ease-in-out infinite alternate;
  }
  @keyframes driftA { from { transform: translateX(-40px); } to { transform: translateX(60px); } }
  @keyframes driftB { from { transform: translateX(50px); } to { transform: translateX(-50px); } }
  @keyframes driftC { from { transform: translateX(-30px); } to { transform: translateX(70px); } }

  /* ===== 粉紅巴士 ===== */
  .bus-wrap {
    position: fixed; top: 64%; left: 50%; transform: translateX(-50%);
    z-index: -1; animation: busFloat 8s ease-in-out infinite;
  }
  @keyframes busFloat { 0%,100% { transform: translateX(-50%); } 50% { transform: translateX(calc(-50% + 8px)); } }
  .bus { width: 150px; height: auto; display: block; opacity: 0.96; }

  @media (prefers-reduced-motion: reduce) {
    .cloud-a, .cloud-b, .cloud-c, .bus-wrap { animation: none; }
  }

  /* ===== 介面 ===== */
  header {
    padding: 16px 20px 12px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .title {
    font-size: 19px; font-weight: 700; letter-spacing: 0.5px;
    color: #fff; text-shadow: 0 1px 4px rgba(180,90,120,0.5);
  }
  .title .dot { color: #fff7c0; }
  .counter {
    font-variant-numeric: tabular-nums; font-size: 14px; font-weight: 700;
    color: #fff; text-shadow: 0 1px 3px rgba(180,90,120,0.5);
  }
  .progress-track {
    height: 4px; margin: 0 20px; border-radius: 4px;
    background: rgba(255,255,255,0.45);
  }
  .progress-bar {
    height: 100%; border-radius: 4px;
    background: #fff; width: 0%; transition: width 0.3s ease;
  }
  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .scene-3d { width: 100%; max-width: 440px; perspective: 1600px; }
  .card {
    position: relative; width: 100%; min-height: 320px; cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-radius: 22px;
    box-shadow: 0 16px 40px var(--shadow);
    border: 1px solid rgba(255,255,255,0.8);
    padding: 32px 26px; display: flex; flex-direction: column;
  }
  .face.back { transform: rotateY(180deg); background: rgba(255,253,248,0.95); }
  .tag {
    font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; align-self: flex-start;
    padding: 5px 12px; border-radius: 20px;
  }
  .face.front .tag { background: #fbe1ea; color: var(--accent-deep); }
  .face.back .tag { background: #d9ece7; color: var(--teal); }
  .content {
    flex: 1; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 14px 4px;
  }
  .q-text { font-size: 21px; line-height: 1.55; font-weight: 600; }
  .a-text { font-size: 23px; line-height: 1.55; font-weight: 600; color: var(--teal); }
  .hint { text-align: center; font-size: 13px; color: var(--muted); letter-spacing: 0.5px; }
  .controls {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; padding: 12px 20px 16px;
  }
  button { font-family: inherit; border: none; cursor: pointer; font-weight: 700;
    transition: transform 0.1s ease, background 0.2s ease; }
  button:active { transform: scale(0.94); }
  .nav-btn {
    width: 58px; height: 58px; border-radius: 50%;
    background: rgba(255,255,255,0.92); box-shadow: 0 4px 14px var(--shadow);
    font-size: 26px; color: var(--ink);
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:disabled { opacity: 0.4; cursor: default; }
  .flip-btn {
    flex: 1; max-width: 190px; height: 58px; border-radius: 30px;
    background: var(--accent); color: #fff; font-size: 17px; letter-spacing: 1px;
    box-shadow: 0 6px 18px rgba(216,95,136,0.4);
  }
  .toolbar {
    display: flex; justify-content: center; gap: 9px;
    padding: 0 20px 24px; flex-wrap: wrap;
  }
  .tool {
    background: rgba(255,255,255,0.85); border: 1.5px solid rgba(255,255,255,0.9);
    color: var(--teal); padding: 9px 16px; border-radius: 22px;
    font-size: 13.5px; font-weight: 600;
    box-shadow: 0 2px 8px rgba(40,50,70,0.1);
  }
  .tool.active { border-color: var(--teal); background: #e3f0ec; }
  .done-banner {
    display: none; text-align: center; font-size: 13px; color: #fff;
    font-weight: 700; padding-bottom: 8px; text-shadow: 0 1px 3px rgba(180,90,120,0.5);
  }
  @media (max-width: 380px) {
    .q-text { font-size: 19px; } .a-text { font-size: 20px; }
    .face { padding: 28px 20px; } .bus { width: 120px; }
  }
</style>
</head>
<body>
  <!-- 背景風景 -->
  <div class="scenery" aria-hidden="true">
    <div class="sky"></div>
    <div class="sun"></div>
    <div class="cloud cloud-a cloud-group" style="left:14%"></div>
    <div class="cloud cloud-b"></div>
    <div class="cloud cloud-c"></div>
    <div class="hills"></div>
    <div class="sea"></div>
    <div class="pole p1"></div>
    <div class="pole p2"></div>
    <div class="pole p3"></div>
    <div class="shore"></div>
    <div class="grass"></div>
    <div class="picnic"></div>
  </div>

  <!-- 粉紅巴士 -->
  <div class="bus-wrap" aria-hidden="true">
    <svg class="bus" viewBox="0 0 150 64" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="10" width="138" height="40" rx="9" fill="#ec85a6"/>
      <rect x="4" y="10" width="138" height="40" rx="9" fill="none" stroke="#d96b8e" stroke-width="1.5"/>
      <rect x="14" y="18" width="16" height="13" rx="2.5" fill="#f6c2d3"/>
      <rect x="36" y="18" width="16" height="13" rx="2.5" fill="#f6c2d3"/>
      <rect x="58" y="18" width="16" height="13" rx="2.5" fill="#f6c2d3"/>
      <rect x="80" y="18" width="16" height="13" rx="2.5" fill="#f6c2d3"/>
      <rect x="102" y="18" width="16" height="13" rx="2.5" fill="#f6c2d3"/>
      <rect x="124" y="18" width="12" height="13" rx="2.5" fill="#f6c2d3"/>
      <circle cx="34" cy="50" r="9" fill="#3a3540"/>
      <circle cx="34" cy="50" r="4" fill="#cfcad4"/>
      <circle cx="112" cy="50" r="9" fill="#3a3540"/>
      <circle cx="112" cy="50" r="4" fill="#cfcad4"/>
    </svg>
  </div>

  <header>
    <div class="title">英文閃卡<span class="dot">.</span></div>
    <div class="counter"><span id="cur">1</span> / <span id="total">100</span></div>
  </header>
  <div class="progress-track"><div class="progress-bar" id="bar"></div></div>

  <main>
    <div class="scene-3d">
      <div class="card" id="card" onclick="flip()">
        <div class="face front">
          <span class="tag">題目</span>
          <div class="content"><div class="q-text" id="q"></div></div>
          <div class="hint">點一下看答案</div>
        </div>
        <div class="face back">
          <span class="tag">答案</span>
          <div class="content"><div class="a-text" id="a"></div></div>
          <div class="hint">點一下回到題目</div>
        </div>
      </div>
    </div>
  </main>

  <div class="done-banner" id="doneBanner">這一輪都看完囉！再洗牌練一次吧 👏</div>

  <div class="controls">
    <button class="nav-btn" id="prev" onclick="prev()">‹</button>
    <button class="flip-btn" onclick="flip()">翻卡</button>
    <button class="nav-btn" id="next" onclick="next()">›</button>
  </div>

  <div class="toolbar">
    <button class="tool" onclick="shuffleCards()">🔀 洗牌</button>
    <button class="tool" onclick="resetOrder()">↺ 原順序</button>
    <button class="tool" id="autoBtn" onclick="toggleAuto()">▶ 自動翻面</button>
  </div>

<script>
const DATA = [{"q": "術語「eponym」的定義為何？", "a": "最初是某人或某物的名字，後來具有更廣泛、通俗意義的詞彙。"}, {"q": "片語「started out as」在課文中的中文意思為何？", "a": "起初是 / 最初作為。"}, {"q": "動詞片語「take on」在描述詞義演變時的含義為何？", "a": "呈現或具有（某種意義或特質）。"}, {"q": "單字「derive」常搭配哪個介系詞來表達「源自於」？", "a": "from。"}, {"q": "「據說…」在英文中常使用哪種虛主詞句型來表達？", "a": "It is said that...。"}, {"q": "單字「feature」作為動詞（v.）時的中文意思為何？", "a": "以…為特色；由…主演。"}, {"q": "「celebrity gossip」翻譯成中文為何？", "a": "名人八卦 / 流言。"}, {"q": "片語「chase around」的中文意思為何？", "a": "到處追逐 / 追趕。"}, {"q": "單字「paparazzi」是指哪一類型的攝影師？", "a": "到處追逐名人的攝影師（狗仔隊）。"}, {"q": "Cloze: Since the software _____ (release) in 1987, it has become the standard tool.", "a": "was released"}, {"q": "文法：哪一個連接詞組可以用來表達「無論實際上使用的是什麼（軟體）」？", "a": "no matter what。"}, {"q": "「too popular for them to stop its widespread use」的中文解釋為何？", "a": "太受歡迎了以至於他們無法停止其廣泛使用。"}, {"q": "「在…中扮演重要角色」的英文常用片語為何？", "a": "play an important part / role in...。"}, {"q": "單字「constantly」用於描述語言變化時，其意思為何？", "a": "持續地 / 不斷地。"}, {"q": "「think up」的同義片語（由 c 開頭）為何？", "a": "come up with。"}, {"q": "單字「origin」與「original」在詞性上有何不同？", "a": "origin 是名詞（起源）；original 是形容詞（原本的）。"}, {"q": "Cloze: The river _____ (起源) here.", "a": "originates"}, {"q": "單字「general」除了「普遍的」之外，在軍事脈絡下名詞（n.）意思為何？", "a": "將軍。"}, {"q": "「一般而言」的英文（使用 general 轉換）為何？", "a": "Generally speaking。"}, {"q": "「reveal」的名詞（n.）形式為何？", "a": "revelation。"}, {"q": "單字「edit」的名詞（n.）形式（指版本）為何？", "a": "edition。"}, {"q": "單字「standard」作為名詞（n.）時，其「達到標準」的動詞可搭配哪些？", "a": "meet / achieve / reach / live up to。"}, {"q": "「alternative」作為名詞（n.）時的中文意思為何？", "a": "替代方案；選擇。"}, {"q": "Cloze: I have no _____ (選擇) but to leave.", "a": "alternative / option"}, {"q": "單字「astronaut」的中文意思為何？", "a": "太空人。"}, {"q": "「gravity」除了物理上的重力，其衍生義為何？", "a": "嚴重性 (seriousness)。"}, {"q": "「powdered milk」翻譯成中文為何？", "a": "奶粉。"}, {"q": "形容詞「liquid」的反義詞（固體）為何？", "a": "solid。"}, {"q": "片語「on a regular basis」等同於哪個副詞？", "a": "regularly (規律地)。"}, {"q": "Cloze: People _____ (傾向於) eat more comfort food when stressed.", "a": "tend to"}, {"q": "「vision」在描述一個人有遠見時，英文怎麼說？", "a": "a man of vision。"}, {"q": "單字「physical」在醫學檢查（體檢）中如何使用？", "a": "physical checkup。"}, {"q": "單字「maintain」在 Review 3 課文中有哪三個主要意思？", "a": "保持、維護保養、堅稱（主張）。"}, {"q": "片語「No sweat!」在口語中代表什麼意思？", "a": "沒問題 / 輕而易舉。"}, {"q": "片語「bump into」除了撞到，還有什麼意思？", "a": "碰巧遇到 (run into)。"}, {"q": "「furthermore」的同義詞有哪些？", "a": "additionally, in addition, besides, what's more。"}, {"q": "「out of this world」用來形容事物時的意思為何？", "a": "極好的（簡直像從另一個世界來的）。"}, {"q": "片語「work out」在體能脈絡下的中文意思為何？", "a": "體能訓練 / 鍛鍊。"}, {"q": "Cloze: The children started a snowball fight and worked _____ a sweat.", "a": "up"}, {"q": "「have a lie-down」翻譯成中文為何？", "a": "躺下休息。"}, {"q": "單字「broaden」在「拓展視野」的用法為何？", "a": "broaden one's horizons。"}, {"q": "「celebrity」的名詞複數形式為何？", "a": "celebrities。"}, {"q": "單字「launch」在商業活動中常用於表達什麼？", "a": "發行（產品）、發起（活動）。"}, {"q": "「arrange」的名詞（n.）形式為何？", "a": "arrangement。"}, {"q": "「assist」的動詞與名詞（助手）形式分別為何？", "a": "assist (v.); assistant (n.)。"}, {"q": "單字「aspect」的中文意思為何？", "a": "方面。"}, {"q": "單字「contain」與「container」的關係為何？", "a": "contain 是動詞（包含）；container 是名詞（容器）。"}, {"q": "「cooperate」的名詞（n.）形式為何？", "a": "cooperation。"}, {"q": "單字「curious」與「curiosity」的中文意思分別為何？", "a": "好奇的（adj.）；好奇心（n.）。"}, {"q": "「elder」與「elderly」在用法上的區別為何？", "a": "elder 指家庭成員中較年長的；elderly 指年紀大的。"}, {"q": "單字「exchange」作為動詞（v.）時的中文意思為何？", "a": "交換。"}, {"q": "「expectation」的動詞（v.）形式為何？", "a": "expect。"}, {"q": "單字「fierce」常用來形容哪兩類事物？", "a": "天氣狀況（強烈的）或動作情感（激烈的）。"}, {"q": "「neighborhood」的中文意思為何？", "a": "鄰近地區。"}, {"q": "單字「occupation」與「occupy」的關係為何？", "a": "occupation 是名詞（職業）；occupy 是動詞（佔據）。"}, {"q": "單字「relax」的中文意思為何？", "a": "放鬆。"}, {"q": "「shelter」作為名詞（n.）與動詞（v.）的共同核心意義為何？", "a": "庇護 / 遮蔽。"}, {"q": "單字「spiritual」與「spirit」的中文意思分別為何？", "a": "精神上的（adj.）；精神/心靈（n.）。"}, {"q": "單字「stroll」的中文意思為何？", "a": "散步。"}, {"q": "單字「temporary」的反義詞為何？", "a": "permanent (永久的)。"}, {"q": "單字「vehicle」的中文意思為何？", "a": "車輛 / 交通工具。"}, {"q": "「authentic」形容食物時代表什麼？", "a": "道地的 / 真正的。"}, {"q": "「banquet」翻譯成中文為何？", "a": "宴會。"}, {"q":  edition」翻譯成中文為何？", "a": "限量版。"}, {"q": "Cloze: Who knows what new words we will _____ (想出) next?", "a": "think up"}];
let order = DATA.map((_, i) => i);
let pos = 0;
let auto = false;
let autoTimer = null;

const cardEl = document.getElementById('card');
const qEl = document.getElementById('q');
const aEl = document.getElementById('a');
const barEl = document.getElementById('bar');
const curEl = document.getElementById('cur');
const totalEl = document.getElementById('total');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const doneBanner = document.getElementById('doneBanner');

totalEl.textContent = DATA.length;

function render() {
  const card = DATA[order[pos]];
  cardEl.classList.remove('flipped');
  qEl.textContent = card.q;
  aEl.textContent = card.a;
  curEl.textContent = pos + 1;
  barEl.style.width = ((pos + 1) / DATA.length * 100) + '%';
  prevBtn.disabled = pos === 0;
  nextBtn.disabled = pos === DATA.length - 1;
  doneBanner.style.display = pos === DATA.length - 1 ? 'block' : 'none';
}
function flip() { cardEl.classList.toggle('flipped'); }
function next() { if (pos < DATA.length - 1) { pos++; render(); } }
function prev() { if (pos > 0) { pos--; render(); } }
function shuffleCards() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  pos = 0; render();
}
function resetOrder() { order = DATA.map((_, i) => i); pos = 0; render(); }
function toggleAuto() {
  auto = !auto;
  const btn = document.getElementById('autoBtn');
  if (auto) { btn.classList.add('active'); btn.textContent = '⏸ 自動翻面'; runAuto(); }
  else { btn.classList.remove('active'); btn.textContent = '▶ 自動翻面'; clearTimeout(autoTimer); }
}
function runAuto() {
  if (!auto) return;
  autoTimer = setTimeout(() => {
    if (!cardEl.classList.contains('flipped')) {
      flip();
      autoTimer = setTimeout(() => { if (auto) { next(); runAuto(); } }, 2500);
    } else { flip(); runAuto(); }
  }, 2800);
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});
let touchX = null;
cardEl.addEventListener('touchstart', e => { touchX = e.changedTouches[0].clientX; }, {passive:true});
cardEl.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 60) { dx < 0 ? next() : prev(); }
  touchX = null;
}, {passive:true});
render();
</script>
